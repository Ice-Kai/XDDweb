# xuedda.com direct new-site gateway. Old PHP files stay on disk but are no longer routed.
location ~* (runtime|application)/ {
    return 403;
}

location = /__choose { return 302 /; }
location = /__select-new { return 302 /; }
location = /__select-old { return 302 /; }

location ^~ /_astro/ {
    alias /www/wwwroot/xuedda-next/dist/client/_astro/;
    expires 30d;
    access_log off;
}

location ^~ /hero/ {
    alias /www/wwwroot/xuedda-next/dist/client/hero/;
    expires 30d;
    access_log off;
}

location ^~ /img/ {
    alias /www/wwwroot/xuedda-next/dist/client/img/;
    expires 30d;
    access_log off;
}

location ^~ /logos/ {
    alias /www/wwwroot/xuedda-next/dist/client/logos/;
    expires 30d;
    access_log off;
}

location = /favicon.ico {
    alias /www/wwwroot/xuedda-next/dist/client/favicon.ico;
    expires 30d;
    access_log off;
}

location = /favicon.svg {
    alias /www/wwwroot/xuedda-next/dist/client/favicon.svg;
    expires 30d;
    access_log off;
}

location ^~ /uploads/ {
    alias /www/wwwroot/xuedda-next/dist/client/uploads/;
    expires 30d;
    access_log off;
}

# Base64 reference images can resemble attack payloads to the generic WAF. This exact,
# authenticated API has its own login, credit, prompt-safety and 8 MB payload checks.
location = /api/ai-image/generate {
    access_by_lua_block { }
    client_max_body_size 10m;
    proxy_pass http://localhost:4321;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_read_timeout 180s;
}

location / {
    proxy_pass http://localhost:4321;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
}
